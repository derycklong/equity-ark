<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>equity.ark</title>
    <script>
      // Apply theme before React renders to avoid a flash of the wrong palette.
      (function () {
        try {
          var t = localStorage.getItem("equity-ark-theme");
          if (t === "light") document.documentElement.classList.add("light");
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
