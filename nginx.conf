server {
    listen 80;
    server_name _;

    # Serve frontend static files
    root /usr/share/nginx/html;
    index index.html;

    # API reverse proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # index.html MUST be re-validated on every visit. Vite's built
    # bundles have content-hashed filenames (e.g. index-AbCdEf.js), so
    # any change to the app produces a new index.html that references
    # the new bundles. Caching index.html itself would leave users stuck
    # on the old app.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Vite emits assets under /assets/ with content-hashed filenames.
    # These are safe to cache forever — when the bundle changes the
    # filename changes, so the browser fetches the new one.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # Also serve any other static files (favicon.svg, equity-ark.svg)
        # with a moderate cache so quick refreshes are still snappy.
        try_files $uri =404;
    }
    location ~* \.(svg|png|ico|webp|woff2?)$ {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
